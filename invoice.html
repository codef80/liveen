<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>الفاتورة | Live English</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
  <link href="assets/css/styles.css" rel="stylesheet">

  <style>
    .brand-logo-img{width:34px;height:34px;object-fit:contain;display:block;border-radius:10px}
    .invoice-page{padding-top:110px;padding-bottom:60px;min-height:100vh}
    .invoice-card{
      background:#fff;border:1px solid #efe7cf;border-radius:30px;
      box-shadow:0 18px 40px rgba(88,89,91,.08);padding:28px
    }
    .invoice-head{
      display:flex;justify-content:space-between;align-items:flex-start;gap:14px;
      border-bottom:1px solid #efe7cf;padding-bottom:18px;margin-bottom:18px;flex-wrap:wrap
    }
    .invoice-title{font-size:1.9rem;font-weight:900;color:#58595b;margin-bottom:6px}
    .invoice-sub{color:#7a7b7f}
    .invoice-badge{
      display:inline-flex;align-items:center;gap:8px;padding:10px 14px;border-radius:999px;
      background:rgba(251,199,13,.14);color:#8a6900;font-weight:900
    }
    .info-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px;margin-bottom:18px}
    .info-box{
      background:linear-gradient(180deg, rgba(255,255,255,.98), rgba(255,249,229,.92));
      border:1px solid #efe7cf;border-radius:18px;padding:14px
    }
    .info-label{color:#7b7c80;font-weight:700;margin-bottom:6px}
    .info-value{color:#58595b;font-weight:900}
    .amount-box{
      background:linear-gradient(135deg,#fbc70d,#ffe06f);
      border-radius:24px;padding:24px;text-align:center;margin:20px 0
    }
    .amount-label{color:#6f5600;font-weight:800;margin-bottom:8px}
    .amount-value{font-size:2.1rem;font-weight:900;color:#58595b}
    .invoice-table-wrap{
      border:1px solid #efe7cf;border-radius:20px;overflow:hidden;margin-top:16px
    }
    .invoice-note{
      margin-top:18px;color:#6f7075;line-height:1.9;background:#fffaf0;
      border:1px solid #efe7cf;border-radius:18px;padding:14px
    }
    .loading-box{
      background:#fff;border:1px solid #efe7cf;border-radius:24px;padding:28px;text-align:center;
      box-shadow:0 10px 24px rgba(88,89,91,.06)
    }
    .loading-spinner{width:2.2rem;height:2.2rem;color:#fbc70d}
    .loading-text{margin-top:12px;color:#6f7075;font-weight:800}
    @media print{
      nav,.btn-print-hide{display:none!important}
      body{background:#fff}
      .invoice-page{padding:0}
      .invoice-card{box-shadow:none;border:none;padding:0}
    }
    @media (max-width:767.98px){
      .info-grid{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg fixed-top glass-nav btn-print-hide">
    <div class="container">
      <a class="navbar-brand" href="index.html">
        <img src="https://i.ibb.co/2QNwJCd/image.png" alt="Live English" class="brand-logo-img">
        <span>Live English</span>
      </a>
      <div class="ms-auto d-flex gap-2">
        <a href="index.html" class="btn btn-le-outline">الرئيسية</a>
        <button class="btn btn-le" onclick="window.print()">طباعة</button>
      </div>
    </div>
  </nav>

  <main class="invoice-page">
    <div class="container">
      <div id="invoiceRoot" class="loading-box">
        <div class="spinner-border loading-spinner" role="status"></div>
        <div class="loading-text">جاري تحميل الفاتورة...</div>
      </div>
    </div>
  </main>
 <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="assets/js/supabase.js"></script>
  <script src="assets/js/config.js"></script>
  <script>
    const API_URL = window.APP_CONFIG.API_URL;

    document.addEventListener('DOMContentLoaded', loadInvoice);

    async function loadInvoice() {
      const params = new URLSearchParams(window.location.search);
      const applicationNo = (params.get('applicationNo') || '').trim();
      const root = document.getElementById('invoiceRoot');

      if (!applicationNo) {
        root.innerHTML = '<div class="invoice-card text-center">رقم الطلب غير موجود.</div>';
        return;
      }

      try {
        const res = await fetch(`${API_URL}?action=getInvoiceByApplicationNo&applicationNo=${encodeURIComponent(applicationNo)}`);
        const json = await res.json();
        if (!json.ok) throw new Error(json.message || 'تعذر تحميل الفاتورة');

        const inv = json.data || {};
        root.className = 'invoice-card';
        root.innerHTML = `
          <div class="invoice-head">
            <div>
              <div class="invoice-title">فاتورة سداد</div>
              <div class="invoice-sub">Live English</div>
            </div>
            <div class="invoice-badge">
              رقم الفاتورة: ${escapeHtml(inv.invoiceNo || '—')}
            </div>
          </div>

          <div class="info-grid">
            <div class="info-box">
              <div class="info-label">رقم الطلب</div>
              <div class="info-value">${escapeHtml(inv.applicationNo || '—')}</div>
            </div>
            <div class="info-box">
              <div class="info-label">اسم الطالب</div>
              <div class="info-value">${escapeHtml(inv.studentName || '—')}</div>
            </div>
            <div class="info-box">
              <div class="info-label">الفئة</div>
              <div class="info-value">${escapeHtml(inv.category || '—')}</div>
            </div>
            <div class="info-box">
              <div class="info-label">تاريخ الإنشاء</div>
              <div class="info-value">${escapeHtml(inv.createdAt || '—')}</div>
            </div>
          </div>

          <div class="amount-box">
            <div class="amount-label">إجمالي الفاتورة</div>
            <div class="amount-value">${formatMoney(inv.amount)}</div>
          </div>

          <div class="invoice-table-wrap">
            <table class="table mb-0">
              <thead>
                <tr>
                  <th>الوصف</th>
                  <th>الكمية</th>
                  <th>المبلغ</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>رسوم التسجيل في برنامج Live English - ${escapeHtml(inv.category || '')}</td>
                  <td>1</td>
                  <td>${formatMoney(inv.amount)}</td>
                </tr>
              </tbody>
            </table>
          </div>

          <div class="invoice-note">
            هذه الفاتورة صادرة آليًا من النظام، ويمكن استخدامها لإتمام السداد ومتابعة الطلب.
          </div>
        `;
      } catch (e) {
        console.error(e);
        root.className = 'invoice-card text-center';
        root.innerHTML = `تعذر تحميل الفاتورة: ${escapeHtml(e.message || 'حدث خطأ')}`;
      }
    }

    function formatMoney(v) {
      const n = Number(v || 0);
      return `${n.toLocaleString('en-US')} ر.س`;
    }
    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;').replace(/'/g,'&#039;');
    }
  </script>
</body>
</html>

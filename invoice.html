<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>الفاتورة | Live English</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
  <link href="assets/css/styles.css" rel="stylesheet">

  <style>
    .brand-logo-img{width:34px;height:34px;object-fit:contain;display:block;border-radius:10px}
    .invoice-page{padding-top:110px;padding-bottom:60px;min-height:100vh}
    .invoice-card{background:#fff;border:1px solid #efe7cf;border-radius:30px;box-shadow:0 18px 40px rgba(88,89,91,.08);padding:28px}
    .invoice-head{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;border-bottom:1px solid #efe7cf;padding-bottom:18px;margin-bottom:18px;flex-wrap:wrap}
    .invoice-title{font-size:1.9rem;font-weight:900;color:#58595b;margin-bottom:6px}
    .invoice-sub{color:#7a7b7f}
    .invoice-badge{display:inline-flex;align-items:center;gap:8px;padding:10px 14px;border-radius:999px;background:rgba(251,199,13,.14);color:#8a6900;font-weight:900}
    .info-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px;margin-bottom:18px}
    .info-box{background:linear-gradient(180deg,rgba(255,255,255,.98),rgba(255,249,229,.92));border:1px solid #efe7cf;border-radius:18px;padding:14px}
    .info-label{color:#7b7c80;font-weight:700;margin-bottom:6px}
    .info-value{color:#58595b;font-weight:900}

    /* كروت المبالغ */
    .amounts-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px;margin:20px 0}
    .amount-card{border-radius:22px;padding:20px;text-align:center}
    .amount-card.total{background:linear-gradient(135deg,#fbc70d,#ffe06f)}
    .amount-card.paid{background:linear-gradient(135deg,#d4edda,#b8dfc4)}
    .amount-card.remaining{background:linear-gradient(135deg,#f8d7da,#f5c2c7)}
    .amount-card.remaining.zero{background:linear-gradient(135deg,#d4edda,#b8dfc4)}
    .amount-card-label{font-weight:800;margin-bottom:8px;font-size:.92rem}
    .amount-card.total .amount-card-label{color:#6f5600}
    .amount-card.paid .amount-card-label{color:#0f5132}
    .amount-card.remaining .amount-card-label{color:#842029}
    .amount-card.remaining.zero .amount-card-label{color:#0f5132}
    .amount-card-value{font-size:1.6rem;font-weight:900;color:#58595b}

    .invoice-table-wrap{border:1px solid #efe7cf;border-radius:20px;overflow:hidden;margin-top:16px}

    /* تاريخ السداد */
    .payment-history{margin-top:20px}
    .payment-history-title{font-size:1.1rem;font-weight:900;color:#58595b;margin-bottom:12px}
    .history-item{background:linear-gradient(180deg,rgba(255,255,255,.98),rgba(255,249,229,.90));border:1px solid #efe7cf;border-radius:16px;padding:12px 16px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
    .history-amount{font-weight:900;color:#198754;font-size:1.05rem}
    .history-meta{color:#8a8b90;font-size:.88rem}
    .history-action{font-weight:800;color:#58595b;font-size:.9rem}

    .status-badge{display:inline-flex;align-items:center;gap:6px;padding:7px 12px;border-radius:999px;font-weight:800;font-size:.88rem}
    .status-paid{background:rgba(25,135,84,.12);color:#198754}
    .status-partial{background:rgba(251,199,13,.16);color:#8a6900}
    .status-pending{background:rgba(220,53,69,.10);color:#dc3545}

    .invoice-note{margin-top:18px;color:#6f7075;line-height:1.9;background:#fffaf0;border:1px solid #efe7cf;border-radius:18px;padding:14px}
    .loading-box{background:#fff;border:1px solid #efe7cf;border-radius:24px;padding:28px;text-align:center;box-shadow:0 10px 24px rgba(88,89,91,.06)}
    .loading-spinner{width:2.2rem;height:2.2rem;color:#fbc70d}
    .loading-text{margin-top:12px;color:#6f7075;font-weight:800}

    @media print{
      nav,.btn-print-hide{display:none!important}
      body{background:#fff}
      .invoice-page{padding:0}
      .invoice-card{box-shadow:none;border:none;padding:0}
    }
    @media (max-width:767.98px){
      .info-grid,.amounts-grid{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg fixed-top glass-nav btn-print-hide">
    <div class="container">
      <a class="navbar-brand" href="index.html">
        <img src="https://i.ibb.co/2QNwJCd/image.png" alt="Live English" class="brand-logo-img">
        <span>Live English</span>
      </a>
      <div class="ms-auto d-flex gap-2">
        <a href="index.html" class="btn btn-le-outline">الرئيسية</a>
        <button class="btn btn-le" onclick="window.print()">
          <i class="fa-solid fa-print"></i> طباعة
        </button>
      </div>
    </div>
  </nav>

  <main class="invoice-page">
    <div class="container">
      <div id="invoiceRoot" class="loading-box">
        <div class="spinner-border loading-spinner" role="status"></div>
        <div class="loading-text">جاري تحميل الفاتورة...</div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="assets/js/supabase.js"></script>
  <script src="assets/js/config.js"></script>
  <script>
    const API_URL = window.APP_CONFIG.API_URL;

    document.addEventListener('DOMContentLoaded', loadInvoice);

    async function loadInvoice() {
      const params = new URLSearchParams(window.location.search);
      const applicationNo = (params.get('applicationNo') || '').trim();
      const root = document.getElementById('invoiceRoot');

      if (!applicationNo) {
        root.innerHTML = '<div class="invoice-card text-center py-5">رقم الطلب غير موجود.</div>';
        return;
      }

      try {
        const res = await fetch(`${API_URL}?action=getInvoiceByApplicationNo&applicationNo=${encodeURIComponent(applicationNo)}`);
        const json = await res.json();
        if (!json.ok) throw new Error(json.message || 'تعذر تحميل الفاتورة');

        const inv = json.data || {};
        const total     = Number(inv.amount      || 0);
        const paid      = Number(inv.paidAmount   || 0);
        const remaining = Number(inv.remaining    !== undefined ? inv.remaining : (total - paid));
        const history   = Array.isArray(inv.paidHistory) ? inv.paidHistory : [];

        // حالة السداد
        const isPaid    = remaining <= 0 && total > 0;
        const isPartial = paid > 0 && remaining > 0;
        const statusHtml = isPaid
          ? `<span class="status-badge status-paid"><i class="fa-solid fa-circle-check"></i> مكتمل السداد</span>`
          : isPartial
          ? `<span class="status-badge status-partial"><i class="fa-solid fa-circle-half-stroke"></i> سداد جزئي</span>`
          : `<span class="status-badge status-pending"><i class="fa-solid fa-clock"></i> بانتظار السداد</span>`;

        root.className = 'invoice-card';
        root.innerHTML = `
          <div class="invoice-head">
            <div>
              <div class="invoice-title">فاتورة سداد</div>
              <div class="invoice-sub">Live English</div>
            </div>
            <div class="d-flex flex-column align-items-end gap-2">
              <div class="invoice-badge">رقم الفاتورة: ${escapeHtml(inv.invoiceNo || '—')}</div>
              ${statusHtml}
            </div>
          </div>

          <div class="info-grid">
            <div class="info-box">
              <div class="info-label">رقم الطلب</div>
              <div class="info-value">${escapeHtml(inv.applicationNo || '—')}</div>
            </div>
            <div class="info-box">
              <div class="info-label">اسم الطالب</div>
              <div class="info-value">${escapeHtml(inv.studentName || '—')}</div>
            </div>
            <div class="info-box">
              <div class="info-label">الفئة</div>
              <div class="info-value">${escapeHtml(inv.category || '—')}</div>
            </div>
            <div class="info-box">
              <div class="info-label">تاريخ الإنشاء</div>
              <div class="info-value">${escapeHtml(inv.createdAt || '—')}</div>
            </div>
          </div>

          <!-- كروت المبالغ الثلاثة -->
          <div class="amounts-grid">
            <div class="amount-card total">
              <div class="amount-card-label">إجمالي الفاتورة</div>
              <div class="amount-card-value">${formatMoney(total)}</div>
            </div>
            <div class="amount-card paid">
              <div class="amount-card-label" style="color:#0f5132">المبلغ المدفوع</div>
              <div class="amount-card-value">${formatMoney(paid)}</div>
            </div>
            <div class="amount-card remaining ${remaining <= 0 ? 'zero' : ''}">
              <div class="amount-card-label">المبلغ المتبقي</div>
              <div class="amount-card-value">${formatMoney(remaining)}</div>
            </div>
          </div>

          <div class="invoice-table-wrap">
            <table class="table mb-0">
              <thead>
                <tr>
                  <th>الوصف</th>
                  <th>الكمية</th>
                  <th>المبلغ</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>رسوم التسجيل في برنامج Live English — ${escapeHtml(inv.category || '')}</td>
                  <td>1</td>
                  <td>${formatMoney(total)}</td>
                </tr>
                ${paid > 0 ? `
                <tr style="color:#198754;font-weight:800">
                  <td>المبلغ المدفوع حتى الآن</td>
                  <td>—</td>
                  <td>- ${formatMoney(paid)}</td>
                </tr>
                <tr style="font-weight:900;background:#fffaf0">
                  <td>المتبقي</td>
                  <td>—</td>
                  <td style="color:${remaining > 0 ? '#dc3545':'#198754'}">${formatMoney(remaining)}</td>
                </tr>` : ''}
              </tbody>
            </table>
          </div>

          ${history.length > 0 ? `
          <div class="payment-history">
            <div class="payment-history-title">سجل الدفعات</div>
            ${history.map(h => `
              <div class="history-item">
                <div>
                  <div class="history-action">${escapeHtml(h.action || 'دفعة')}</div>
                  <div class="history-meta">${escapeHtml(h.actor || '')} — ${escapeHtml(formatDate(h.date))}</div>
                  ${h.notes ? `<div class="history-meta">${escapeHtml(h.notes)}</div>` : ''}
                </div>
                <div class="history-amount">+ ${formatMoney(h.amount)}</div>
              </div>
            `).join('')}
          </div>` : ''}

          <div class="invoice-note">
            هذه الفاتورة صادرة آليًا من نظام Live English، ويمكن استخدامها لإتمام السداد ومتابعة الطلب.
          </div>
        `;
      } catch (e) {
        console.error(e);
        root.className = 'invoice-card text-center py-5';
        root.innerHTML = `<div class="text-muted fw-bold">تعذر تحميل الفاتورة<br><small>${escapeHtml(e.message || 'حدث خطأ')}</small></div>`;
      }
    }

    function formatMoney(v) {
      const n = Number(v || 0);
      return `${n.toLocaleString('en-US')} ر.س`;
    }

    function formatDate(iso) {
      if (!iso) return '';
      try {
        return new Date(iso).toLocaleString('ar-SA', { timeZone: 'Asia/Riyadh', year:'numeric', month:'long', day:'numeric' });
      } catch { return iso; }
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;').replace(/'/g,'&#039;');
    }
  </script>
</body>
</html>

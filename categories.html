<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>الفئات | Live English</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
  <link href="assets/css/styles.css" rel="stylesheet">

  <style>
    .brand-logo-img{
      width:34px;
      height:34px;
      object-fit:contain;
      display:block;
      border-radius:10px;
    }

    .categories-page{
      padding-top:120px;
      padding-bottom:60px;
      min-height:100vh;
    }

    .page-head{
      background:linear-gradient(145deg, rgba(255,255,255,.98), rgba(255,248,223,.95));
      border:1px solid rgba(251,199,13,.22);
      border-radius:34px;
      box-shadow:0 24px 60px rgba(88,89,91,.12);
      padding:28px;
      margin-bottom:26px;
    }

    .page-title{
      font-size:2rem;
      font-weight:900;
      color:#58595b;
      margin-bottom:8px;
    }

    .page-text{
      color:#6f7075;
      line-height:1.95;
      margin:0;
    }

    .category-show-card{
      background:#fff;
      border:1px solid #efe7cf;
      border-radius:30px;
      box-shadow:0 16px 36px rgba(88,89,91,.08);
      overflow:hidden;
      height:100%;
      transition:.28s ease;
    }

    .category-show-card:hover{
      transform:translateY(-8px);
      box-shadow:0 24px 48px rgba(88,89,91,.14);
    }

    .category-show-cover-wrap{
      width:100%;
      aspect-ratio:9/16;
      background:#f8f1db;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:10px;
    }

    .category-show-cover{
      width:100%;
      height:100%;
      object-fit:contain;
      display:block;
      background:#f8f1db;
      border-radius:22px;
    }

    .category-show-body{
      padding:24px;
    }

    .category-show-badge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 12px;
      border-radius:999px;
      background:rgba(251,199,13,.14);
      color:#8a6900;
      font-weight:800;
      font-size:.92rem;
      margin-bottom:14px;
    }

    .category-show-title{
      font-size:1.5rem;
      font-weight:900;
      color:#58595b;
      margin-bottom:12px;
    }

    .category-show-desc{
      color:#6f7075;
      line-height:2;
      margin-bottom:18px;
    }

    .category-show-meta{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-bottom:18px;
    }

    .meta-pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 12px;
      border-radius:999px;
      font-weight:800;
      font-size:.9rem;
    }

    .meta-open{ background:rgba(25,135,84,.12); color:#198754; }
    .meta-closed{ background:rgba(220,53,69,.10); color:#dc3545; }

    .category-actions{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
    }

    .loading-box{
      background:#fff;
      border:1px solid #efe7cf;
      border-radius:24px;
      padding:28px;
      text-align:center;
      box-shadow:0 10px 24px rgba(88,89,91,.06);
    }

    .loading-spinner{
      width:2.2rem;
      height:2.2rem;
      color:#fbc70d;
    }

    .loading-text{
      margin-top:12px;
      color:#6f7075;
      font-weight:800;
    }

    .small-nav-btn{
      padding:.5rem .9rem !important;
      font-size:.92rem !important;
      border-radius:12px !important;
    }

    .footer-clean{
      background:linear-gradient(135deg, #58595b, #4a4b4e);
      color:#fff;
      padding:28px 0;
      margin-top:72px;
    }

    .footer-social{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      justify-content:flex-end;
    }

    .footer-social a{
      width:44px;
      height:44px;
      border-radius:14px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:rgba(255,255,255,.12);
      color:#fff;
      transition:.28s ease;
    }

    .footer-social a:hover{
      background:#fbc70d;
      color:#58595b;
      transform:translateY(-3px);
    }

    .made-by-wrap{
      display:flex;
      align-items:center;
      gap:8px;
      justify-content:flex-start;
      flex-wrap:wrap;
    }

    .made-by-link{
      display:inline-flex;
      flex-direction:column;
      align-items:center;
      gap:4px;
      color:#fff;
      text-decoration:none;
      font-weight:700;
      font-size:.88rem;
      line-height:1;
    }

    .made-by-link:hover{
      color:#fbc70d;
    }

    .made-by-line{
      display:inline-flex;
      align-items:center;
      gap:6px;
      justify-content:center;
    }

    .made-by-underline{
      width:100%;
      height:1px;
      background:rgba(255,255,255,.45);
      border-radius:999px;
    }

    .made-by-logo{
      width:16px;
      height:16px;
      object-fit:contain;
      display:block;
    }

    @media (max-width:991.98px){
      .categories-page{
        padding-top:108px;
      }
    }
  </style>
</head>
<body>

  <nav class="navbar navbar-expand-lg fixed-top glass-nav">
    <div class="container">
      <a class="navbar-brand" href="index.html">
        <img src="https://i.ibb.co/2QNwJCd/image.png" alt="Live English" class="brand-logo-img">
        <span>Live English</span>
      </a>

      <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
        <i class="fa-solid fa-bars-staggered"></i>
      </button>

      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav ms-auto mb-3 mb-lg-0 align-items-lg-center gap-lg-2">
          <li class="nav-item"><a class="nav-link active" href="categories.html">الفئات</a></li>
          <li class="nav-item"><a class="nav-link" href="years.html">عبر السنوات</a></li>
          <li class="nav-item"><a class="nav-link" href="track.html">متابعة الطلب</a></li>
          <li class="nav-item"><a class="nav-link" href="staff-login.html">دخول العاملين</a></li>
        </ul>

        <div class="d-flex flex-column flex-lg-row gap-2 ms-lg-3">
          <a href="index.html" class="btn btn-le-outline small-nav-btn">
            <i class="fa-solid fa-house"></i>
            الرئيسية
          </a>
          <a href="register.html" class="btn btn-le small-nav-btn">
            <i class="fa-solid fa-pen-to-square"></i>
            التسجيل
          </a>
        </div>
      </div>
    </div>
  </nav>

  <main class="categories-page">
    <div class="container">
      <div class="page-head">
        <div class="page-title">الفئات</div>
        <p class="page-text">استعرض الفئات المتاحة في البرنامج، ثم انتقل إلى التسجيل عند اختيار الفئة المناسبة.</p>
      </div>

      <div class="row g-4" id="categoriesContainer">
        <div class="col-12">
          <div class="loading-box">
            <div class="spinner-border loading-spinner" role="status"></div>
            <div class="loading-text">جاري التحميل...</div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="footer-clean">
    <div class="container">
      <div class="row g-4 align-items-center">
        <div class="col-lg-6">
          <div class="fw-bold mb-1">Live English</div>
          <div class="text-white-50 mb-2">جميع الحقوق محفوظة</div>
          <div class="made-by-wrap">
            <a class="made-by-link" href="https://codefyd.github.io/CODEF1/" target="_blank" rel="noopener noreferrer">
              <span class="made-by-line">
                <span>صنع بواسطة codef</span>
                <img src="https://i.ibb.co/VyGwJgs/1561.png" alt="codef" class="made-by-logo">
              </span>
              <span class="made-by-underline"></span>
            </a>
          </div>
        </div>
        <div class="col-lg-6">
          <div class="footer-social">
            <a href="#" id="footerYoutube" aria-label="YouTube"><i class="fa-brands fa-youtube"></i></a>
            <a href="#" id="footerInstagram" aria-label="Instagram"><i class="fa-brands fa-instagram"></i></a>
            <a href="#" id="footerX" aria-label="X"><i class="fa-brands fa-x-twitter"></i></a>
            <a href="#" id="footerSnapchat" aria-label="Snapchat"><i class="fa-brands fa-snapchat"></i></a>
          </div>
        </div>
      </div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="assets/js/supabase.js"></script>
  <script src="assets/js/config.js"></script>

  <script>
    const API_URL = window.APP_CONFIG.API_URL;

    document.addEventListener('DOMContentLoaded', async () => {
      await Promise.all([
        loadCategories(),
        loadPublicSettings()
      ]);
    });

    async function loadCategories() {
      const container = document.getElementById('categoriesContainer');
      container.innerHTML = `
        <div class="col-12">
          <div class="loading-box">
            <div class="spinner-border loading-spinner" role="status"></div>
            <div class="loading-text">جاري التحميل...</div>
          </div>
        </div>
      `;

      try {
        const res = await fetch(`${API_URL}?action=getPackages`);
        const json = await res.json();
        const items = json?.data || [];

        if (!items.length) {
          container.innerHTML = '<div class="col-12"><div class="empty-box">لا توجد فئات مفعلة حاليًا.</div></div>';
          return;
        }

        container.innerHTML = items.map(item => `
          <div class="col-lg-6">
            <div class="category-show-card">
              <div class="category-show-cover-wrap">
                <img
                  class="category-show-cover"
                  src="${escapeAttr(normalizeDriveImageUrl(item.imageUrl || '')) || placeholderImg(item.title || 'Live English')}"
                  alt="${escapeAttr(item.title || '')}"
                >
              </div>

              <div class="category-show-body">
                <div class="category-show-badge">
                  <i class="fa-solid fa-layer-group"></i>
                  فئة البرنامج
                </div>

                <div class="category-show-title">${escapeHtml(item.title || '')}</div>
                <div class="category-show-desc">${escapeHtml(item.description || '')}</div>

                <div class="category-show-meta">
                  <span class="meta-pill ${item.registerEnabled ? 'meta-open' : 'meta-closed'}">
                    <i class="fa-solid ${item.registerEnabled ? 'fa-circle-check' : 'fa-circle-xmark'}"></i>
                    ${item.registerEnabled ? 'التسجيل متاح' : 'التسجيل مغلق'}
                  </span>
                </div>

                <div class="category-actions">
                  <a href="register.html?category=${encodeURIComponent(item.title || '')}" class="btn btn-le ${item.registerEnabled ? '' : 'disabled'}" ${item.registerEnabled ? '' : 'tabindex="-1" aria-disabled="true"'}>
                    <i class="fa-solid fa-arrow-left-long"></i>
                    التسجيل في ${escapeHtml(item.title || '')}
                  </a>

                  <a href="${escapeAttr(buildOpenImageUrl(item.imageUrl || ''))}" target="_blank" rel="noopener noreferrer" class="btn btn-le-outline">
                    <i class="fa-solid fa-image"></i>
                    فتح الصورة
                  </a>
                </div>
              </div>
            </div>
          </div>
        `).join('');
      } catch (e) {
        console.error(e);
        container.innerHTML = '<div class="col-12"><div class="empty-box">تعذر تحميل الفئات.</div></div>';
      }
    }

    async function loadPublicSettings() {
      try {
        const res = await fetch(`${API_URL}?action=initData`);
        const json = await res.json();
        const settings = json?.data?.settings || {};

        applySocialLinks(settings);
      } catch (e) {
        console.error(e);
      }
    }

    function applySocialLinks(settings) {
      setLink('footerYoutube', settings['رابط_يوتيوب']);
      setLink('footerInstagram', settings['رابط_انستغرام']);
      setLink('footerX', settings['رابط_X']);
      setLink('footerSnapchat', settings['رابط_سناب']);
    }

    function setLink(id, url) {
      const el = document.getElementById(id);
      if (!el) return;

      const finalUrl = String(url || '').trim();
      if (!finalUrl) {
        el.style.opacity = '.45';
        el.style.pointerEvents = 'none';
        el.setAttribute('href', '#');
        return;
      }

      el.setAttribute('href', finalUrl);
      el.setAttribute('target', '_blank');
      el.setAttribute('rel', 'noopener noreferrer');
    }

    function normalizeDriveImageUrl(url) {
      url = String(url || '').trim();
      if (!url) return '';

      const fileId = extractGoogleDriveFileId(url);
      if (fileId) {
        return `https://drive.google.com/thumbnail?id=${encodeURIComponent(fileId)}&sz=w2000`;
      }

      return url;
    }

    function buildOpenImageUrl(url) {
      url = String(url || '').trim();
      if (!url) return '#';

      const fileId = extractGoogleDriveFileId(url);
      if (fileId) {
        return `https://drive.google.com/uc?export=view&id=${encodeURIComponent(fileId)}`;
      }

      return url;
    }

    function extractGoogleDriveFileId(url) {
      url = String(url || '').trim();
      if (!url) return '';

      const patterns = [
        /[?&]id=([^&]+)/,
        /\/file\/d\/([^/]+)/,
        /\/thumbnail\?id=([^&]+)/,
        /\/uc\?(?:export=[^&]+&)?id=([^&]+)/
      ];

      for (const p of patterns) {
        const m = url.match(p);
        if (m && m[1]) return m[1];
      }

      return '';
    }

    function placeholderImg(text) {
      return `https://placehold.co/900x1600/f8f1db/58595b?text=${encodeURIComponent(text || 'Live English')}`;
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function escapeAttr(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/"/g, '&quot;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }
  </script>
</body>
</html>

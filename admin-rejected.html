<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>المرفوضون والمنسحبون | Live English</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
  <link href="assets/css/styles.css" rel="stylesheet">

  <style>
    .page-wrap{padding-top:110px;padding-bottom:60px;min-height:100vh}
    .head-box{
      background:linear-gradient(145deg,rgba(255,255,255,.98),rgba(255,248,223,.96));
      border:1px solid rgba(251,199,13,.22);
      border-radius:32px;box-shadow:0 22px 48px rgba(88,89,91,.10);
      padding:24px;margin-bottom:22px
    }
    .head-title{font-size:1.9rem;font-weight:900;color:#58595b;margin-bottom:8px}
    .head-text{color:#707176;margin:0;line-height:1.9}

    .stats-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px;margin-bottom:22px}
    .stat-card{
      background:#fff;border:1px solid #efe7cf;border-radius:24px;
      box-shadow:0 12px 28px rgba(88,89,91,.08);padding:20px;height:100%;
      position:relative;overflow:hidden
    }
    .stat-card::after{
      content:"";position:absolute;width:110px;height:110px;border-radius:50%;
      left:-28px;bottom:-28px;background:rgba(251,199,13,.12)
    }
    .stat-label{color:#77787d;font-weight:700;margin-bottom:10px;position:relative;z-index:1}
    .stat-value{color:#58595b;font-size:2rem;font-weight:900;line-height:1.1;position:relative;z-index:1}

    .panel-box{
      background:#fff;border:1px solid #efe7cf;border-radius:28px;
      box-shadow:0 16px 36px rgba(88,89,91,.08);padding:22px;margin-bottom:22px
    }
    .panel-title{font-size:1.2rem;font-weight:900;color:#58595b;margin-bottom:16px}

    .filters-grid{
      display:grid;grid-template-columns:2fr 1fr 1fr auto;gap:14px;align-items:end;margin-bottom:18px
    }

    .table-shell{overflow:auto;border-radius:22px;border:1px solid #f0ead7}
    .table-main{margin:0;min-width:1100px;vertical-align:middle}
    .table-main thead th{
      background:#fff7da;color:#58595b;font-weight:900;border-bottom:1px solid #eadca9;white-space:nowrap
    }
    .table-main td{color:#5d5e62;white-space:nowrap}

    .status-badge{
      display:inline-flex;align-items:center;gap:8px;padding:8px 12px;border-radius:999px;
      font-weight:800;font-size:.9rem
    }
    .status-danger{background:rgba(220,53,69,.10);color:#dc3545}
    .status-progress{background:rgba(88,89,91,.10);color:#58595b}

    .actions-row{display:flex;gap:8px;flex-wrap:wrap}
    .mini-btn{
      border:0;border-radius:12px;padding:8px 12px;font-weight:800;transition:.25s ease;
      display:inline-flex;align-items:center;gap:8px
    }
    .mini-btn:hover{transform:translateY(-2px)}
    .mini-btn-view{background:#fff4c7;color:#6f5600}
    .mini-btn-restore{background:#e8f7ee;color:#198754}

    @media (max-width:991.98px){
      .stats-grid{grid-template-columns:1fr}
      .filters-grid{grid-template-columns:1fr}
    }
  </style>
</head>
<body>

  <nav class="navbar navbar-expand-lg fixed-top glass-nav">
    <div class="container">
      <a class="navbar-brand" href="index.html">
        <span class="brand-badge"><i class="fa-solid fa-language"></i></span>
        <span>Live English</span>
      </a>

      <div class="ms-auto d-flex gap-2">
        <a href="admin.html" class="btn btn-le-outline">
          <i class="fa-solid fa-table-columns"></i>
          لوحة المشرف
        </a>
        <button id="logoutBtn" class="btn btn-le-dark">
          <i class="fa-solid fa-right-from-bracket"></i>
          خروج
        </button>
      </div>
    </div>
  </nav>

  <main class="page-wrap">
    <div class="container">
      <div class="head-box">
        <div class="head-title">المرفوضون والمنسحبون</div>
        <p class="head-text">عرض الطلاب الذين تم رفضهم أو انسحبوا، مع إمكانية الاستعادة إلى مرحلة التسجيل.</p>
      </div>

      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">الإجمالي</div>
          <div class="stat-value" id="statTotal">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">المرفوضون</div>
          <div class="stat-value" id="statRejected">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">المنسحبون</div>
          <div class="stat-value" id="statWithdrawn">0</div>
        </div>
      </div>

      <div class="panel-box">
        <div class="panel-title">القائمة</div>

        <div class="filters-grid">
          <div>
            <label class="form-label">بحث</label>
            <input type="text" id="searchInput" class="form-control" placeholder="اسم الطالب أو رقم الطلب">
          </div>
          <div>
            <label class="form-label">الفئة</label>
            <select id="categoryFilter" class="form-select">
              <option value="">الكل</option>
              <option value="أشبال">أشبال</option>
              <option value="قادة">قادة</option>
            </select>
          </div>
          <div>
            <label class="form-label">الحالة</label>
            <select id="statusFilter" class="form-select">
              <option value="">الكل</option>
              <option value="مرفوض">مرفوض</option>
              <option value="منسحب">منسحب</option>
            </select>
          </div>
          <div class="d-grid">
            <button id="applyFilterBtn" class="btn btn-le">
              <i class="fa-solid fa-filter"></i>
              تطبيق
            </button>
          </div>
        </div>

        <div class="table-shell">
          <table class="table table-main">
            <thead>
              <tr>
                <th>رقم الطلب</th>
                <th>الاسم</th>
                <th>الفئة</th>
                <th>الحالة</th>
                <th>ولي الأمر</th>
                <th>الإجراءات</th>
              </tr>
            </thead>
            <tbody id="tableBody">
              <tr>
                <td colspan="6" class="text-center py-4">جاري تحميل البيانات...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="assets/js/supabase.js"></script>
  <script src="assets/js/config.js"></script>
  <script>
    const API_URL = window.APP_CONFIG.API_URL;
    let currentUser = null;
    let currentRows = [];

    document.addEventListener('DOMContentLoaded', async () => {
      guardAuth();
      bindEvents();
      await loadRejectedData();
    });

    function guardAuth() {
      const raw = localStorage.getItem('liveEnglishStaffUser');
      if (!raw) {
        window.location.href = 'staff-login.html';
        return;
      }

      try {
        currentUser = JSON.parse(raw);
      } catch {
        localStorage.removeItem('liveEnglishStaffUser');
        window.location.href = 'staff-login.html';
      }
    }

    function bindEvents() {
      document.getElementById('logoutBtn').addEventListener('click', logout);
      document.getElementById('applyFilterBtn').addEventListener('click', loadRejectedData);
      document.getElementById('searchInput').addEventListener('keydown', e => {
        if (e.key === 'Enter') loadRejectedData();
      });
    }

    async function loadRejectedData() {
      const tbody = document.getElementById('tableBody');
      tbody.innerHTML = '<tr><td colspan="6" class="text-center py-4">جاري تحميل البيانات...</td></tr>';

      const params = new URLSearchParams({
        action: 'getRejectedApplications',
        search: document.getElementById('searchInput').value.trim(),
        category: document.getElementById('categoryFilter').value,
        status: document.getElementById('statusFilter').value
      });

      try {
        const res = await fetch(`${API_URL}?${params.toString()}`);
        const json = await res.json();
        currentRows = json?.data || [];

        renderStats(currentRows);

        if (!currentRows.length) {
          tbody.innerHTML = '<tr><td colspan="6" class="text-center py-4">لا توجد نتائج.</td></tr>';
          return;
        }

        tbody.innerHTML = currentRows.map(r => `
          <tr>
            <td>${escapeHtml(r.applicationNo || '')}</td>
            <td class="fw-bold">${escapeHtml(r.name || '')}</td>
            <td>${escapeHtml(r.category || '')}</td>
            <td>${renderStatus(r.applicationStatus)}</td>
            <td>${escapeHtml(r.guardianPhone || '—')}</td>
            <td>
              <div class="actions-row">
                <button class="mini-btn mini-btn-view" onclick="viewProfile('${escapeJs(r.applicationNo)}')">
                  <i class="fa-solid fa-eye"></i>
                  عرض
                </button>
                <button class="mini-btn mini-btn-restore" onclick="restoreApplication('${escapeJs(r.applicationNo)}')">
                  <i class="fa-solid fa-rotate-left"></i>
                  استعادة
                </button>
              </div>
            </td>
          </tr>
        `).join('');
      } catch (e) {
        console.error(e);
        tbody.innerHTML = '<tr><td colspan="6" class="text-center py-4">تعذر تحميل البيانات.</td></tr>';
      }
    }

    function renderStats(rows) {
      const rejected = rows.filter(r => String(r.applicationStatus || '') === 'مرفوض').length;
      const withdrawn = rows.filter(r => String(r.applicationStatus || '') === 'منسحب').length;

      document.getElementById('statTotal').textContent = rows.length;
      document.getElementById('statRejected').textContent = rejected;
      document.getElementById('statWithdrawn').textContent = withdrawn;
    }

    async function restoreApplication(applicationNo) {
      const result = await Swal.fire({
        title: 'استعادة الطلب',
        text: 'سيتم إرجاع الطلب إلى مرحلة التسجيل الأولي',
        showCancelButton: true,
        confirmButtonText: 'استعادة',
        cancelButtonText: 'إلغاء',
        confirmButtonColor: '#fbc70d'
      });

      if (!result.isConfirmed) return;

      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({
            action: 'restoreApplication',
            actor: currentUser?.name || 'مستخدم النظام',
            data: {
              'رقم_الطلب': applicationNo
            }
          })
        });

        const json = await res.json();
        if (!json.ok) throw new Error(json.message || 'فشل التنفيذ');

        await Swal.fire({
          icon: 'success',
          title: 'تمت الاستعادة',
          confirmButtonColor: '#fbc70d'
        });

        await loadRejectedData();
      } catch (e) {
        console.error(e);
        Swal.fire({
          icon: 'error',
          title: 'تعذر التنفيذ',
          text: e.message || 'حدث خطأ',
          confirmButtonColor: '#58595b'
        });
      }
    }

    async function viewProfile(applicationNo) {
      try {
        const res = await fetch(`${API_URL}?action=getStudentProfile&applicationNo=${encodeURIComponent(applicationNo)}`);
        const json = await res.json();
        if (!json.ok) throw new Error(json.message || 'تعذر تحميل البيانات');

        const app = json.data?.application || {};
        await Swal.fire({
          title: app['اسم_الطالب_الثلاثي'] || 'الطالب',
          width: 760,
          html: `
            <div class="text-end" style="display:flex;flex-direction:column;gap:12px">
              <div style="border:1px solid #efe7cf;border-radius:18px;padding:14px 16px;background:#fffaf0">
                <div><strong>رقم الطلب:</strong> ${escapeHtml(app['رقم_الطلب'] || '')}</div>
                <div><strong>الفئة:</strong> ${escapeHtml(app['الفئة'] || '')}</div>
                <div><strong>حالة الطلب:</strong> ${escapeHtml(app['حالة_الطلب'] || '')}</div>
                <div><strong>ولي الأمر:</strong> ${escapeHtml(app['جوال_ولي_الأمر'] || '')}</div>
                <div><strong>ملاحظات عامة:</strong> ${escapeHtml(app['ملاحظات_عامة'] || '—')}</div>
                <div><strong>سبب الرفض:</strong> ${escapeHtml(app['سبب_الرفض'] || '—')}</div>
              </div>
            </div>
          `,
          confirmButtonColor: '#fbc70d',
          confirmButtonText: 'إغلاق'
        });
      } catch (e) {
        console.error(e);
        Swal.fire({
          icon: 'error',
          title: 'تعذر العرض',
          text: e.message || 'حدث خطأ',
          confirmButtonColor: '#58595b'
        });
      }
    }

    function renderStatus(status) {
      return `<span class="status-badge ${String(status || '') === 'منسحب' ? 'status-progress' : 'status-danger'}">${escapeHtml(status || '—')}</span>`;
    }

    function logout() {
      localStorage.removeItem('liveEnglishStaffUser');
      window.location.href = 'staff-login.html';
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function escapeJs(value) {
      return String(value ?? '').replace(/'/g, "\\'");
    }
  </script>
</body>
</html>
